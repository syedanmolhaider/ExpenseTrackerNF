<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker - Login</title>
  <meta name="description" content="Track your monthly budget and daily expenses. Login to get started." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>

<body>
  <div class="container">
    <div class="auth-card">
      <h1 class="logo">💰 ExpenseTracker</h1>

      <!-- Login Form -->
      <div id="loginForm" class="form-container">
        <h2>Login</h2>
        <form id="loginFormElement">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" name="email" placeholder="you@email.com" required />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" name="password" placeholder="••••••" required />
          </div>
          <div id="loginError" class="error-message"></div>
          <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <p class="switch-form">
          Don't have an account?
          <a href="#" id="showSignup">Sign up</a>
        </p>
      </div>

      <!-- Signup Form -->
      <div id="signupForm" class="form-container" style="display: none">
        <h2>Sign Up</h2>
        <form id="signupFormElement">
          <div class="form-group">
            <label for="signupName">Name</label>
            <input type="text" id="signupName" name="name" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" name="email" placeholder="you@email.com" required />
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" name="password" placeholder="Min 6 characters" required
              minlength="6" />
            <small>Minimum 6 characters</small>
          </div>
          <div id="signupError" class="error-message"></div>
          <button type="submit" class="btn btn-primary">Sign Up</button>
        </form>
        <p class="switch-form">
          Already have an account?
          <a href="#" id="showLogin">Login</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>

</html>
