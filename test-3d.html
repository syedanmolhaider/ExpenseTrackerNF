<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Test - Neon Expense Tracker</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #05060a;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
      }

      #info {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(11, 15, 26, 0.9);
        backdrop-filter: blur(20px);
        padding: 20px;
        border-radius: 12px;
        border: 1px solid rgba(0, 229, 255, 0.3);
        z-index: 1000;
        max-width: 400px;
      }

      #info h1 {
        margin: 0 0 16px 0;
        font-size: 20px;
        color: #00e5ff;
        text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
      }

      #info ul {
        margin: 0;
        padding-left: 20px;
        line-height: 1.8;
      }

      #info li {
        margin: 8px 0;
      }

      .status {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        margin-right: 8px;
      }

      .status.success {
        background: #c7ff00;
        box-shadow: 0 0 10px rgba(199, 255, 0, 0.5);
      }

      .status.error {
        background: #ff0055;
        box-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
      }

      .test-button {
        margin-top: 16px;
        padding: 12px 24px;
        background: linear-gradient(135deg, #ff00d1, #00e5ff);
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .test-button:hover {
        transform: scale(1.05);
      }

      .test-button:active {
        transform: scale(0.95);
      }

      #canvas-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>

    <div id="info">
      <h1>🧪 3D System Test</h1>
      <ul id="test-results">
        <li>
          <span class="status" id="three-status"></span>Three.js:
          <span id="three-text">Checking...</span>
        </li>
        <li>
          <span class="status" id="gsap-status"></span>GSAP:
          <span id="gsap-text">Checking...</span>
        </li>
        <li>
          <span class="status" id="webgl-status"></span>WebGL:
          <span id="webgl-text">Checking...</span>
        </li>
        <li>
          <span class="status" id="stage-status"></span>ThreeStage:
          <span id="stage-text">Checking...</span>
        </li>
        <li>
          <span class="status" id="click-status"></span>MicroClick:
          <span id="click-text">Checking...</span>
        </li>
        <li>
          <span class="status" id="pointer-status"></span>PointerController:
          <span id="pointer-text">Checking...</span>
        </li>
        <li>
          <span class="status" id="viz-status"></span>Visualizer:
          <span id="viz-text">Checking...</span>
        </li>
        <li>
          <span class="status" id="app-status"></span>App Init:
          <span id="app-text">Checking...</span>
        </li>
      </ul>
      <button class="test-button" id="spawn-particles">
        Test Particle Spawn
      </button>
      <button class="test-button" id="test-animation">
        Test Click Animation
      </button>
    </div>

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <!-- GSAP -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <!-- 3D Modules -->
    <script src="js/three-stage.js"></script>
    <script src="js/micro-click.js"></script>
    <script src="js/pointer-controller.js"></script>
    <script src="js/dashboard-visualizer.js"></script>

    <script>
      // Test runner
      function setStatus(id, success, text) {
        const statusEl = document.getElementById(id + "-status");
        const textEl = document.getElementById(id + "-text");
        statusEl.className = "status " + (success ? "success" : "error");
        textEl.textContent = text;
      }

      // Test Three.js
      setTimeout(() => {
        if (typeof THREE !== "undefined") {
          setStatus("three", true, "Loaded (v" + THREE.REVISION + ")");
        } else {
          setStatus("three", false, "NOT LOADED");
        }
      }, 100);

      // Test GSAP
      setTimeout(() => {
        if (typeof gsap !== "undefined") {
          setStatus("gsap", true, "Loaded (v" + gsap.version + ")");
        } else {
          setStatus("gsap", false, "NOT LOADED");
        }
      }, 100);

      // Test WebGL
      setTimeout(() => {
        const canvas = document.createElement("canvas");
        const gl =
          canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
        if (gl) {
          const debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
          const renderer = debugInfo
            ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)
            : "Unknown";
          setStatus(
            "webgl",
            true,
            "Supported (" + renderer.substring(0, 30) + ")"
          );
        } else {
          setStatus("webgl", false, "NOT SUPPORTED");
        }
      }, 100);

      // Test ThreeStage class
      setTimeout(() => {
        if (typeof ThreeStage !== "undefined") {
          try {
            const testStage = new ThreeStage();
            setStatus("stage", true, "Initialized");

            // Store for testing
            window.testStage = testStage;

            // Test MicroClickAnimator
            if (typeof MicroClickAnimator !== "undefined") {
              window.testMicroClick = new MicroClickAnimator(testStage);
              setStatus("click", true, "Initialized");
            } else {
              setStatus("click", false, "Class not found");
            }

            // Test PointerController
            if (typeof PointerController !== "undefined") {
              window.testPointer = new PointerController(testStage);
              setStatus("pointer", true, "Initialized");
            } else {
              setStatus("pointer", false, "Class not found");
            }

            // Test DashboardVisualizer
            if (typeof DashboardVisualizer !== "undefined") {
              window.testViz = new DashboardVisualizer(testStage);
              setStatus("viz", true, "Initialized");
            } else {
              setStatus("viz", false, "Class not found");
            }

            setStatus("app", true, "All systems ready");
          } catch (error) {
            setStatus("stage", false, error.message);
            setStatus("click", false, "Stage failed");
            setStatus("pointer", false, "Stage failed");
            setStatus("viz", false, "Stage failed");
            setStatus("app", false, error.message);
          }
        } else {
          setStatus("stage", false, "Class not found");
          setStatus("click", false, "Waiting for stage");
          setStatus("pointer", false, "Waiting for stage");
          setStatus("viz", false, "Waiting for stage");
          setStatus("app", false, "Stage not available");
        }
      }, 500);

      // Test buttons
      document
        .getElementById("spawn-particles")
        ?.addEventListener("click", function (e) {
          if (window.testMicroClick) {
            window.testMicroClick.spawnParticles(
              window.innerWidth / 2,
              window.innerHeight / 2,
              0xff00d1
            );
            console.log("Spawned particles at center");
          } else {
            console.error("MicroClick not initialized");
          }
        });

      document
        .getElementById("test-animation")
        ?.addEventListener("click", function (e) {
          if (window.testMicroClick) {
            window.testMicroClick.microClickAnimation(e.target, e);
            console.log("Triggered click animation");
          } else {
            console.error("MicroClick not initialized");
          }
        });

      // Log to console
      console.log("🧪 3D Test Page Loaded");
      console.log("Check the info panel for test results");
    </script>
  </body>
</html>
